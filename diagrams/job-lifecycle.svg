<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 330" width="1040" height="330" role="img" aria-label="Job-Lebenszyklus: Pending, Queued, Running und die Endzustände Succeeded, Failed, DeadLettered, Cancelled, plus Retrying-Schleife">
  <defs>
    <style>
      text{font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
      .lbl-sm{font-size:13px;font-weight:650;fill:#0f1720}
      .edge-lbl{font-size:11px;fill:#5a6b76}
      .comp rect{fill:#fff;stroke:#cfd9e0;stroke-width:1.5}
      .flow{fill:none;stroke:#9fb0bb;stroke-width:2}
      .branch{fill:none;stroke-width:1.8;stroke-dasharray:5 5}
      .branch.gray{stroke:#6b7785}
      .term-green{fill:#e7f6ec;stroke:#1a7f37!important}
      .term-red{fill:#fdecec;stroke:#cf222e!important}
      .term-amber{fill:#fbf3e2;stroke:#9a6700!important}
      .term-gray{fill:#eef1f3;stroke:#6b7785!important}
      .term-violet{fill:#f1ecfa;stroke:#6f42c1!important}
      .run-node{fill:#fff;stroke:#0f766e!important;stroke-width:2!important}
      .t-green{fill:#1a7f37}.t-red{fill:#cf222e}.t-amber{fill:#9a6700}.t-gray{fill:#6b7785}.t-violet{fill:#6f42c1}.t-accent{fill:#0b5a54}
    </style>
    <marker id="sa" markerWidth="10" markerHeight="10" refX="7.5" refY="4.5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M1,1 L8.5,4.5 L1,8 Z" fill="#9fb0bb"/></marker>
    <marker id="sa-gray" markerWidth="10" markerHeight="10" refX="7.5" refY="4.5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M1,1 L8.5,4.5 L1,8 Z" fill="#6b7785"/></marker>
  </defs>

  <rect x="0" y="0" width="1040" height="330" fill="#e9eef2"/>

  <!-- edges first -->
  <path class="flow" d="M150,175 L195,175" marker-end="url(#sa)"/>
  <path class="flow" d="M315,175 L360,175" marker-end="url(#sa)"/>
  <path class="flow" d="M425,150 L425,112" marker-end="url(#sa)"/>
  <path class="flow" d="M500,85 C540,95 510,150 480,150" marker-end="url(#sa)"/>
  <path class="branch gray" d="M425,200 L425,250" marker-end="url(#sa-gray)"/>
  <path class="flow" d="M490,162 C540,140 545,95 575,82" marker-end="url(#sa)"/>
  <path class="flow" d="M490,175 L575,175" marker-end="url(#sa)"/>
  <path class="flow" d="M490,188 C540,210 545,255 575,268" marker-end="url(#sa)"/>

  <text class="edge-lbl" x="437" y="132">wiederholbar,</text>
  <text class="edge-lbl" x="437" y="146">Versuche übrig</text>
  <text class="edge-lbl" x="505" y="120">nach Backoff</text>
  <text class="edge-lbl" x="520" y="135">alle Steps fertig</text>
  <text class="edge-lbl" x="500" y="168">nicht wiederholbar</text>
  <text class="edge-lbl" x="505" y="240">wiederholbar, erschöpft</text>
  <text class="edge-lbl" x="333" y="240" fill="#6b7785">Set-RestJobStatus</text>

  <!-- nodes -->
  <g class="comp"><rect x="30" y="150" width="120" height="50" rx="9"/>
    <text class="lbl-sm" x="90" y="180" text-anchor="middle">Pending</text></g>
  <g class="comp"><rect x="195" y="150" width="120" height="50" rx="9"/>
    <text class="lbl-sm" x="255" y="180" text-anchor="middle">Queued</text></g>
  <g class="comp"><rect class="run-node" x="360" y="150" width="130" height="50" rx="9"/>
    <text class="lbl-sm t-accent" x="425" y="180" text-anchor="middle">Running</text></g>
  <g class="comp"><rect class="term-violet" x="350" y="60" width="150" height="50" rx="9"/>
    <text class="lbl-sm t-violet" x="425" y="90" text-anchor="middle">Retrying</text></g>
  <g class="comp"><rect class="term-gray" x="360" y="250" width="130" height="50" rx="9"/>
    <text class="lbl-sm t-gray" x="425" y="280" text-anchor="middle">Cancelled</text></g>
  <g class="comp"><rect class="term-green" x="575" y="56" width="160" height="50" rx="9"/>
    <text class="lbl-sm t-green" x="655" y="86" text-anchor="middle">Succeeded</text></g>
  <g class="comp"><rect class="term-red" x="575" y="150" width="160" height="50" rx="9"/>
    <text class="lbl-sm t-red" x="655" y="180" text-anchor="middle">Failed</text></g>
  <g class="comp"><rect class="term-amber" x="575" y="244" width="180" height="50" rx="9"/>
    <text class="lbl-sm t-amber" x="665" y="274" text-anchor="middle">DeadLettered</text></g>
</svg>
