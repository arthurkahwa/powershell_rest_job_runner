# OpenAPI 3.0.3 specification for the JSONPlaceholder-style CRUD REST API
openapi: 3.0.3
info:
  title: JSONPlaceholder CRUD API
  version: 1.0.0
  description: |-
    A typical resource-oriented REST API exposing CRUD operations over five
    resources: posts, comments, albums, photos and users.

    This is the API targeted by the RestJobRunner PowerShell module and reproduced
    locally by the accompanying Mockoon environment.

    Two servers are provided: the public JSONPlaceholder API (which simulates writes
    without persisting them) and a local Mockoon mock (which persists writes in memory
    until restarted). Note that list query conventions differ slightly between them:
    JSONPlaceholder uses `_page`/`_limit`/`_sort`/`_order` and bare field filters
    (e.g. `?postId=1`), while the Mockoon CRUD routes use `page`/`limit`/`sort`/`order`
    and `field_eq` filters (e.g. `?postId_eq=1`).
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
servers:
- url: https://jsonplaceholder.typicode.com
  description: Public JSONPlaceholder API (writes are simulated, not persisted).
- url: http://localhost:3001
  description: Local Mockoon mock (full CRUD, persisted in memory until restart).
tags:
- name: posts
  description: Blog posts.
- name: comments
  description: Comments belonging to posts.
- name: albums
  description: Photo albums owned by users.
- name: photos
  description: Photos belonging to albums.
- name: users
  description: Application users.
paths:
  /posts:
    get:
      tags:
      - posts
      summary: List posts
      description: Returns all posts. Supports filtering, sorting and pagination via query parameters.
      operationId: listPosts
      parameters:
      - $ref: '#/components/parameters/UserIdFilter'
      - $ref: '#/components/parameters/PageParam'
      - $ref: '#/components/parameters/LimitParam'
      - $ref: '#/components/parameters/SortParam'
      - $ref: '#/components/parameters/OrderParam'
      responses:
        '200':
          description: An array of posts.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Post'
    post:
      tags:
      - posts
      summary: Create a post
      description: Creates a new post. The server assigns the `id`.
      operationId: createPost
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Post'
      responses:
        '201':
          description: The created post.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'
        '400':
          $ref: '#/components/responses/BadRequest'
  /posts/{id}:
    parameters:
    - $ref: '#/components/parameters/ResourceId'
    get:
      tags:
      - posts
      summary: Get a post by ID
      operationId: getPost
      responses:
        '200':
          description: The requested post.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags:
      - posts
      summary: Replace a post
      description: Replaces the entire post resource with the supplied representation.
      operationId: replacePost
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Post'
      responses:
        '200':
          description: The updated post.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags:
      - posts
      summary: Partially update a post
      description: Updates only the supplied fields of the post. Any subset of properties may be sent.
      operationId: updatePost
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Post'
      responses:
        '200':
          description: The updated post.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags:
      - posts
      summary: Delete a post
      operationId: deletePost
      responses:
        '200':
          description: The post was deleted. Returns an empty object.
        '404':
          $ref: '#/components/responses/NotFound'
