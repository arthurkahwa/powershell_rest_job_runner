components:
  schemas:
    Post:
      type: object
      required:
      - userId
      - title
      - body
      properties:
        id:
          type: integer
          format: int64
          readOnly: true
          example: 1
          description: Server-assigned unique identifier.
        userId:
          type: integer
          format: int64
          example: 1
          description: Id of the user who authored the post.
        title:
          type: string
          example: sunt aut facere repellat provident
        body:
          type: string
          example: |-
            quia et suscipit
            suscipit recusandae consequuntur
    Comment:
      type: object
      required:
      - postId
      - name
      - email
      - body
      properties:
        id:
          type: integer
          format: int64
          readOnly: true
          example: 1
          description: Server-assigned unique identifier.
        postId:
          type: integer
          format: int64
          example: 1
          description: Id of the post this comment belongs to.
        name:
          type: string
          example: id labore ex et quam laborum
        email:
          type: string
          format: email
          example: '[email protected]'
        body:
          type: string
          example: laudantium enim quasi est quidem magnam
    Album:
      type: object
      required:
      - userId
      - title
      properties:
        id:
          type: integer
          format: int64
          readOnly: true
          example: 1
          description: Server-assigned unique identifier.
        userId:
          type: integer
          format: int64
          example: 1
          description: Id of the user who owns the album.
        title:
          type: string
          example: quidem molestiae enim
    Photo:
      type: object
      required:
      - albumId
      - title
      - url
      - thumbnailUrl
      properties:
        id:
          type: integer
          format: int64
          readOnly: true
          example: 1
          description: Server-assigned unique identifier.
        albumId:
          type: integer
          format: int64
          example: 2
          description: Id of the album this photo belongs to.
        title:
          type: string
          example: accusamus beatae ad facilis cum similique
        url:
          type: string
          format: uri
          example: https://via.placeholder.com/600/92c952
        thumbnailUrl:
          type: string
          format: uri
          example: https://via.placeholder.com/150/92c952
    User:
      type: object
      required:
      - name
      - username
      - email
      properties:
        id:
          type: integer
          format: int64
          readOnly: true
          example: 1
          description: Server-assigned unique identifier.
        name:
          type: string
          example: Leanne Graham
        username:
          type: string
          example: Bret
        email:
          type: string
          format: email
          example: '[email protected]'
        address:
          $ref: '#/components/schemas/Address'
        phone:
          type: string
          example: 1-770-736-8031 x56442
        website:
          type: string
          example: hildegard.org
        company:
          $ref: '#/components/schemas/Company'
    Address:
      type: object
      properties:
        street:
          type: string
          example: Kulas Light
        suite:
          type: string
          example: Apt. 556
        city:
          type: string
          example: Gwenborough
        zipcode:
          type: string
          example: 92998-3874
        geo:
          $ref: '#/components/schemas/Geo'
    Geo:
      type: object
      description: Geo-coordinates as strings, matching the JSONPlaceholder shape.
      properties:
        lat:
          type: string
          example: '-37.3159'
        lng:
          type: string
          example: '81.1496'
    Company:
      type: object
      properties:
        name:
          type: string
          example: Romaguera-Crona
        catchPhrase:
          type: string
          example: Multi-layered client-server neural-net
        bs:
          type: string
          example: harness real-time e-markets
    Error:
      type: object
      properties:
        message:
          type: string
          example: Resource not found
  parameters:
    ResourceId:
      name: id
      in: path
      required: true
      description: Numeric identifier of the resource.
      schema:
        type: integer
        format: int64
        minimum: 1
    UserIdFilter:
      name: userId
      in: query
      required: false
      description: Filter the collection by owning user id.
      schema:
        type: integer
        format: int64
    PostIdFilter:
      name: postId
      in: query
      required: false
      description: Filter the collection by parent post id.
      schema:
        type: integer
        format: int64
    AlbumIdFilter:
      name: albumId
      in: query
      required: false
      description: Filter the collection by parent album id.
      schema:
        type: integer
        format: int64
    PageParam:
      name: _page
      in: query
      required: false
      description: 1-based page number (JSONPlaceholder pagination). The Mockoon mock uses `page`.
      schema:
        type: integer
        minimum: 1
    LimitParam:
      name: _limit
      in: query
      required: false
      description: Maximum items per page (JSONPlaceholder pagination). The Mockoon mock uses `limit`.
      schema:
        type: integer
        minimum: 1
    SortParam:
      name: _sort
      in: query
      required: false
      description: Property name to sort by. The Mockoon mock uses `sort`.
      schema:
        type: string
    OrderParam:
      name: _order
      in: query
      required: false
      description: Sort direction. The Mockoon mock uses `order`.
      schema:
        type: string
        enum:
        - asc
        - desc
        default: asc
  responses:
    NotFound:
      description: The resource was not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    BadRequest:
      description: The request payload was invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
